services:
  db:
    image: mysql:8.4
    container_name: mobilidade_mysql
    environment:
      MYSQL_DATABASE: mobilidade
      MYSQL_USER: mobilidade_user
      MYSQL_PASSWORD: mobilidade_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: mobilidade_etl
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: mobilidade
      DB_USER: mobilidade_user
      DB_PASSWORD: mobilidade_pass
    volumes:
      - ./data:/app/data

volumes:
  mysql_data:
