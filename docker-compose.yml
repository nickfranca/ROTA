services:
  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/api/resumo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: prf
      POSTGRES_USER: prf
      POSTGRES_PASSWORD: prf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prf -d prf"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  loader:
    build: .
    command: ["python", "-m", "app.loader"]
    environment:
      DATABASE_URL: postgresql://prf:prf@db:5432/prf
      DATA_ROOT: /data
      LOAD_CHUNK_SIZE: 25000
    volumes:
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    profiles: ["load"]

  benchmark:
    build: .
    command:
      [
        "python",
        "-m",
        "app.benchmark",
        "--workers",
        "1",
        "2",
        "3",
        "--repetitions",
        "3",
        "--output",
        "/results",
      ]
    environment:
      DATABASE_URL: postgresql://prf:prf@db:5432/prf
      DATA_ROOT: /data
      LOAD_CHUNK_SIZE: 25000
    volumes:
      - ./data:/data:ro
      - ./benchmark/results:/results
    depends_on:
      db:
        condition: service_healthy
    profiles: ["benchmark"]

  scraper:
    build: .
    command: ["python", "prf_scraper.py", "2024", "2025", "2026"]
    volumes:
      - ./data:/app/data
    profiles: ["scrape"]

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://prf:prf@db:5432/prf
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dashboard:
    build: .
    command:
      [
        "streamlit",
        "run",
        "app/dashboard.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://prf:prf@db:5432/prf?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
